name: chebfun
description: "Chebfun is an open-source software system for numerical computing with functions."
version: unspecified
dependencies: []
homepage: "https://github.com/chebfun/chebfun"
repository: "https://github.com/chebfun/chebfun"
license: "BSD-3-Clause"

defaults:
  release_number: 50
  prepare:
    clone_git:
      url: "https://github.com/chebfun/chebfun"
      destination: "chebfun"
      remove_dirs:
        - tests
        - chebguiDemos
  addpaths:
    - path: "chebfun"

builds:
  - architectures: [any]
