name: mip
description: "MIP package manager for MATLAB (mip-yaml branch)"
version: "mip_yaml"
dependencies: []
homepage: "https://github.com/mip-org/mip-package-manager"
repository: "https://github.com/mip-org/mip-package-manager"
license: "Apache-2.0"

defaults:
  release_number: 1
  prepare:
    - clone_git:
        url: "https://github.com/mip-org/mip-package-manager"
        subdirectory: "matlab"
        destination: "mip"
        branch: "mip-yaml"
    - clone_git:
        url: "https://github.com/ewiger/yamlmatlab"
        destination: "yamlmatlab"
  addpaths:
    - path: "mip"
    - path: "yamlmatlab"

builds:
  - architectures: [any]
